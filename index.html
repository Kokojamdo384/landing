<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Портфолио — дизайн-макеты лендингов</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Портфолио демо-лендингов: CoreTech (IT для медицинских сетей) и CoffeeSmart (сеть умных кофеен)." />
<style>
  :root{
    --bg:#07070c;
    --text:#eef1f0;
    --text-dim:#8b96a0;
    --border:rgba(255,255,255,.1);
    --accent:#2fe0c6;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI",system-ui,Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:32px;
  }
  .wrap{ max-width:720px; width:100%; }
  .eyebrow{ font-family:ui-monospace,"SF Mono",Consolas,monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); }
  h1{ font-size:clamp(28px,4vw,40px); line-height:1.15; margin:14px 0 40px; font-weight:600; }
  .cards{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:640px){ .cards{ grid-template-columns:1fr; } }
  a.card{
    display:block; text-decoration:none; color:inherit;
    border:1px solid var(--border); border-radius:16px; padding:28px;
    background:rgba(255,255,255,.03);
    transition:border-color .2s ease, transform .2s ease;
  }
  a.card:hover{ border-color:var(--accent); transform:translateY(-3px); }
  .card-tag{ font-family:ui-monospace,"SF Mono",Consolas,monospace; font-size:11px; letter-spacing:.1em; color:var(--text-dim); text-transform:uppercase; }
  .card-title{ font-size:20px; font-weight:600; margin-top:10px; }
  .card-desc{ font-size:13.5px; color:var(--text-dim); margin-top:8px; line-height:1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Портфолио</div>
    <h1>Дизайн-макеты лендингов</h1>
    <div class="cards">
      <a class="card" href="./coretech/">
        <div class="card-tag">IT / B2B / медтех</div>
        <div class="card-title">CoreTech</div>
        <div class="card-desc">Экосистемы для сетей медицинских клиник — сайт, приложение, интеграция с МИС.</div>
      </a>
      <a class="card" href="./coffeesmart/">
        <div class="card-tag">Retail / стратегия</div>
        <div class="card-title">CoffeeSmart</div>
        <div class="card-desc">Сеть умных кофеен самообслуживания — маркетинговая стратегия 2026–2027.</div>
      </a>
    </div>
  </div>
</body>
</html>
